name: AI Mention Bot

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  respond:
    if: contains(github.event.comment.body, '@ai-helper')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: AI Response
        uses: actions/github-script@v7
        with:
          script: |
            const { Anthropic } = require('@anthropic-ai/sdk');
            const client = new Anthropic({ apiKey: process.env.ANTHROPIC_API_KEY });

            const comment = context.payload.comment.body;
            const question = comment.replace(/@ai-helper\s*/gi, '').trim();

            const response = await client.messages.create({
              model: "claude-sonnet-4-6",
              max_tokens: 2048,
              messages: [{
                role: "user",
                content: `You are a helpful code assistant on GitHub. Answer this question concisely with code examples if relevant:\n\n${question}`
              }]
            });

            const answer = response.content[0].text;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `> 🤖 **@ai-helper** responding to @${context.payload.comment.user.login}\n\n${answer}`
            });
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
